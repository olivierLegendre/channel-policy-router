services:
  postgres:
    image: postgres:16
    container_name: channel-policy-router-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: channel_policy_router
    ports:
      - "55434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d channel_policy_router"]
      interval: 5s
      timeout: 5s
      retries: 20
